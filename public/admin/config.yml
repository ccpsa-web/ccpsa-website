      - label: "Privacy Policy"
        name: "privacy-policy"
        file: "content/pages/privacy-policy.json"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" }
          - { label: "Effective Date Text", name: "effectiveDate", widget: "text" }
          - label: "Policy Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Content Type", name: "contentType", widget: "select", options: ["text", "list"] }
              - { label: "Content", name: "content", widget: "text", hint: "For list type, separate items with newlines" }
          - { label: "Privacy Officer Phone", name: "privacyOfficerPhone", widget: "string" }
          - { label: "Privacy Officer Email", name: "privacyOfficerEmail", widget: "string" }
          - { label: "Privacy Officer Address", name: "privacyOfficerAddress", widget: "string" }
          - { label: "Privacy Officer City", name: "privacyOfficerCity", widget: "string" }
          - { label: "Complaint Agency", name: "complaintAgency", widget: "string" }
          - { label: "Complaint Office", name: "complaintOffice", widget: "string" }
          - { label: "Complaint Email", name: "complaintEmail", widget: "string" }
          - label: "Rights Details"
            name: "rightsDetails"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Border Style", name: "style", widget: "select", options: ["navy", "blue", "amber", "sage"] }
          - { label: "Acknowledgement Body", name: "acknowledgementBody", widget: "text" }
          - { label: "CTA Heading", name: "ctaHeading", widget: "string" }
