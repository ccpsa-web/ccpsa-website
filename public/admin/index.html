<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CCPSA Admin</title>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/@sveltia/cms@0.149.0/dist/sveltia-cms.js"></script>
  <script>
    function doInit() {
      var CMS = window.CMS || window.SveltiaCMS;
      if (CMS && CMS.init) {
        CMS.init({
          config: {
            load_config_file: false,
            backend: {
              name: "github",
              repo: "ccpsa-web/ccpsa-website",
              branch: "main",
              base_url: window.location.origin,
              auth_endpoint: "/api/auth"
            },
            media_folder: "public/images",
            public_folder: "/images",
            collections: [
              {
                name: "settings",
                label: "Site Settings",
                description: "Global settings that appear on every page (footer, header/navigation).",
                files: [
                  {
                    label: "Footer",
                    name: "footer",
                    file: "content/settings/footer.json",
                    description: "Controls the footer that appears at the bottom of every page.",
                    fields: [
                      { label: "Practice Short Name", name: "practiceName", widget: "string", hint: "Shown as the heading of the first footer column (e.g. 'CCPSA')" },
                      { label: "Practice Full Name", name: "practiceFullName", widget: "string", hint: "Displayed under the heading (e.g. 'Critical Care, Pulmonary & Sleep Associates')" },
                      { label: "Address (street)", name: "address", widget: "string", hint: "e.g. 274 Union Blvd, Suite 200" },
                      { label: "Address (city, state, zip)", name: "city", widget: "string", hint: "e.g. Lakewood, CO 80228" },
                      { label: "Phone", name: "phone", widget: "string", hint: "e.g. (303) 951-0600" },
                      { label: "Fax", name: "fax", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      { label: "Google Review URL", name: "googleReviewUrl", widget: "string", required: false, hint: "Full URL to Google reviews page. Leave blank to hide the review badge." },
                      { label: "Google Review Image", name: "googleReviewImage", widget: "image", required: false, hint: "Small badge image shown next to the review link." },
                      {
                        label: "Footer Link Columns", name: "columns", widget: "list",
                        min: 1, max: 3,
                        hint: "Up to 3 columns of links next to the address block. Do not add more than 3.",
                        fields: [
                          { label: "Column Heading", name: "heading", widget: "string" },
                          {
                            label: "Links", name: "links", widget: "list",
                            fields: [
                              { label: "Label", name: "label", widget: "string" },
                              { label: "URL", name: "href", widget: "string", hint: "Internal path (e.g. /our-team) or full URL for external sites" },
                              { label: "Opens in new tab?", name: "external", widget: "boolean", default: false, hint: "Check this for links to external websites (patient portal, etc.)" }
                            ]
                          }
                        ]
                      },
                      { label: "HIPAA Notice Text", name: "bottomBarLine1", widget: "string", required: false, hint: "Bottom bar line above the copyright. Leave blank to hide." },
                      { label: "Copyright Name", name: "bottomBarCopyrightName", widget: "string", hint: "Used in the copyright line. Year is automatic." }
                    ]
                  },
                  {
                    label: "Header / Navigation",
                    name: "header",
                    file: "content/settings/header.json",
                    description: "Controls the logo and top navigation links on every page.",
                    fields: [
                      { label: "Logo Image", name: "logoImage", widget: "image", hint: "Site logo shown at the top of every page" },
                      { label: "Logo Alt Text", name: "logoAlt", widget: "string", hint: "Describes the logo for screen readers (e.g. 'CCPSA Logo')" },
                      {
                        label: "Navigation Links", name: "navLinks", widget: "list",
                        hint: "Top navigation menu. Keep to ~7 links or fewer to avoid crowding.",
                        fields: [
                          { label: "Label", name: "label", widget: "string" },
                          { label: "URL", name: "href", widget: "string", hint: "Internal path (e.g. /our-team) or anchor (e.g. /#services)" }
                        ]
                      }
                    ]
                  }
                ]
              },
              {
                name: "providers",
                label: "Providers",
                label_singular: "Provider",
                folder: "content/providers",
                create: true,
                delete: true,
                extension: "json",
                format: "json",
                slug: "{{slug}}",
                summary: "{{fields.lastName}}, {{fields.name}} — {{fields.credentials}}",
                sortable_fields: ["lastName", "name"],
                fields: [
                  { label: "Name", name: "name", widget: "string", hint: "Full name (e.g. Darren Boé)" },
                  { label: "Last Name", name: "lastName", widget: "string", hint: "Used for sorting (e.g. Boé)" },
                  { label: "Credentials", name: "credentials", widget: "string", hint: "e.g. MD, PhD", required: false },
                  { label: "Title", name: "title", widget: "string", hint: "e.g. Attending Physician, Managing Partner" },
                  {
                    label: "Categories", name: "categories", widget: "select", multiple: true, min: 1,
                    options: [
                      { label: "Critical Care", value: "critical-care" },
                      { label: "Interventional Pulmonology", value: "interventional-pulmonology" },
                      { label: "Outpatient Pulmonary & Sleep", value: "outpatient-pulmonary-sleep" },
                      { label: "Advanced Practice Provider", value: "app" },
                      { label: "Allied Health", value: "allied-health" },
                      { label: "Executive", value: "executive" }
                    ]
                  },
                  {
                    label: "Locations", name: "locations", widget: "list", required: false,
                    hint: "Service locations (e.g. West, South, North, Central, Multiple)",
                    field: { label: "Location", name: "location", widget: "string" }
                  },
                  { label: "Photo", name: "image", widget: "image", hint: "Upload provider headshot" },
                  { label: "Biography", name: "bio", widget: "text", hint: "Provider biography" }
                ]
              },
              {
                name: "jobs",
                label: "Job Listings",
                label_singular: "Job Listing",
                folder: "content/jobs",
                create: true,
                delete: true,
                extension: "json",
                format: "json",
                slug: "{{slug}}",
                summary: "{{fields.title}} - {{fields.location}} ({{fields.status}})",
                fields: [
                  { label: "Job Title", name: "title", widget: "string" },
                  { label: "Location", name: "location", widget: "string", hint: "e.g. Parker, CO" },
                  {
                    label: "Employment Type", name: "type", widget: "select",
                    options: ["Full-time", "Part-time", "Contract", "PRN"]
                  },
                  {
                    label: "Status", name: "status", widget: "select",
                    options: [
                      { label: "Open", value: "open" },
                      { label: "Closed", value: "closed" }
                    ]
                  },
                  { label: "Summary", name: "summary", widget: "text", hint: "Brief job description shown on the card" },
                  {
                    label: "Essential Responsibilities", name: "responsibilities", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  {
                    label: "Skills & Education Requirements", name: "requirements", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  {
                    label: "Physical Requirements", name: "physicalRequirements", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  {
                    label: "Compensation & Benefits", name: "compensation", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  { label: "Display Order", name: "order", widget: "number", value_type: "int", hint: "Lower numbers appear first" }
                ]
              },
              {
                name: "pages",
                label: "Page Content",
                files: [
                  {
                    label: "Homepage",
                    name: "homepage",
                    file: "content/pages/homepage.json",
                    fields: [
                      { label: "Hero Tagline", name: "heroTagline", widget: "string" },
                      { label: "Hero Title", name: "heroTitle", widget: "string" },
                      { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" },
                      { label: "Phone Number", name: "phone", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      { label: "Address", name: "address", widget: "string" },
                      { label: "Fax", name: "fax", widget: "string" },
                      { label: "Schedule URL", name: "scheduleUrl", widget: "string", required: false },
                      { label: "Office Hours", name: "officeHours", widget: "string", required: false },
                      { label: "Services Title", name: "servicesTitle", widget: "string", required: false },
                      { label: "Services Subtitle", name: "servicesSubtitle", widget: "text", required: false },
                      {
                        label: "Services", name: "services", widget: "list", required: false,
                        min: 6, max: 6,
                        hint: "There are 6 fixed service cards. Edit the title, description, and link for each. DO NOT add or remove cards — the icons and colors are tied to position.",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" },
                          { label: "Link", name: "href", widget: "string" }
                        ]
                      },
                      { label: "Team Section Tag", name: "teamSectionTag", widget: "string", required: false },
                      { label: "Team Section Title", name: "teamSectionTitle", widget: "string", required: false },
                      { label: "Team Section Text", name: "teamSectionText", widget: "text", required: false },
                      {
                        label: "Team Highlights", name: "teamHighlights", widget: "list", required: false,
                        field: { label: "Highlight", name: "highlight", widget: "string" }
                      },
                      {
                        label: "Stats", name: "stats", widget: "list", required: false,
                        min: 3, max: 3,
                        hint: "There are 3 fixed stat cards. Edit the number and label. DO NOT add or remove cards — the icons are tied to position.",
                        fields: [
                          { label: "Number", name: "number", widget: "string" },
                          { label: "Label", name: "label", widget: "string" }
                        ]
                      },
                      { label: "Appointment Title", name: "appointmentTitle", widget: "string", required: false },
                      { label: "Appointment Subtitle", name: "appointmentSubtitle", widget: "text", required: false },
                      { label: "Telehealth Title", name: "telehealthTitle", widget: "string", required: false },
                      { label: "Telehealth Text", name: "telehealthText", widget: "text", required: false },
                      {
                        label: "Telehealth Features", name: "telehealthFeatures", widget: "list", required: false,
                        min: 4, max: 4,
                        hint: "There are 4 fixed feature cards. Edit the title and description. DO NOT add or remove cards.",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" }
                        ]
                      },
                      { label: "Testimonials Title", name: "testimonialsTitle", widget: "string", required: false },
                      { label: "Testimonials Subtitle", name: "testimonialsSubtitle", widget: "text", required: false },
                      {
                        label: "Testimonials", name: "testimonials", widget: "list", required: false,
                        min: 3, max: 3,
                        hint: "3 testimonials display in a row. Edit quote, author name, and role.",
                        fields: [
                          { label: "Quote", name: "quote", widget: "text" },
                          { label: "Author", name: "author", widget: "string", hint: "e.g. 'Sarah M.' — do NOT use full patient names" },
                          { label: "Role", name: "role", widget: "string", hint: "e.g. 'Former ICU Patient'" }
                        ]
                      },
                      { label: "Affiliations Title", name: "affiliationsTitle", widget: "string", required: false },
                      { label: "Affiliations Subtitle", name: "affiliationsSubtitle", widget: "text", required: false },
                      {
                        label: "Affiliations & Recognition Logos", name: "affiliations", widget: "list", required: false,
                        hint: "Logos and badges shown in the Affiliations section. You can add, remove, or reorder.",
                        fields: [
                          { label: "Logo Image", name: "image", widget: "image" },
                          { label: "Alt Text", name: "alt", widget: "string", hint: "Describes the logo for screen readers (e.g. 'AdventHealth')" },
                          {
                            label: "Display Size", name: "size", widget: "select", default: "small",
                            options: [
                              { label: "Small (wider logos like AdventHealth)", value: "small" },
                              { label: "Large (square badges like U.S. News)", value: "large" }
                            ]
                          }
                        ]
                      },
                      { label: "CTA Title", name: "ctaTitle", widget: "string", required: false },
                      { label: "CTA Text", name: "ctaText", widget: "text", required: false }
                    ]
                  },
                  {
                    label: "Contact Page",
                    name: "contact",
                    file: "content/pages/contact.json",
                    fields: [
                      { label: "Page Title", name: "title", widget: "string" },
                      { label: "Phone", name: "phone", widget: "string" },
                      { label: "Fax", name: "fax", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      {
                        label: "Locations", name: "locations", widget: "list",
                        fields: [
                          { label: "Name", name: "name", widget: "string" },
                          { label: "Address", name: "address", widget: "string" },
                          { label: "Phone", name: "phone", widget: "string" }
                        ]
                      }
                    ]
                  },
                  {
                    label: "For Patients",
                    name: "for-patients",
                    file: "content/pages/for-patients.json",
                    fields: [
                      { label: "Title", name: "title", widget: "string" },
                      { label: "Subtitle", name: "subtitle", widget: "text" },
                      { label: "Quick Access Title", name: "quickAccessTitle", widget: "string" },
                      { label: "Quick Access Subtitle", name: "quickAccessSubtitle", widget: "text" },
                      {
                        label: "Quick Access Cards", name: "quickAccessCards", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" },
                          { label: "Button Text", name: "buttonText", widget: "string" },
                          { label: "Link (optional, overrides default)", name: "link", widget: "string", required: false }
                        ]
                      },
                      { label: "Before Visit Title", name: "beforeVisitTitle", widget: "string" },
                      {
                        label: "Before Visit Items", name: "beforeVisitItems", widget: "list",
                        field: { label: "Item", name: "item", widget: "string" }
                      },
                      { label: "What to Expect Title", name: "whatToExpectTitle", widget: "string" },
                      { label: "What to Expect Text", name: "whatToExpectText", widget: "text" },
                      {
                        label: "Clinic Locations", name: "clinicLocations", widget: "list",
                        fields: [
                          { label: "Name", name: "name", widget: "string" },
                          { label: "Address", name: "address", widget: "string" },
                          { label: "City", name: "city", widget: "string" },
                          { label: "Phone", name: "phone", widget: "string" },
                          { label: "Fax", name: "fax", widget: "string" }
                        ]
                      },
                      {
                        label: "Patient Resources", name: "patientResources", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" },
                          { label: "Link", name: "link", widget: "string" },
                          { label: "External", name: "external", widget: "boolean" }
                        ]
                      },
                      {
                        label: "Insurance & Billing", name: "insuranceBilling", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" }
                        ]
                      },
                      { label: "CTA Title", name: "ctaTitle", widget: "string" },
                      { label: "CTA Text", name: "ctaText", widget: "text" },
                      { label: "Schedule URL", name: "scheduleUrl", widget: "string" },
                      { label: "Phone", name: "phone", widget: "string" }
                    ]
                  },
                  {
                    label: "For Physicians",
                    name: "for-physicians",
                    file: "content/pages/for-physicians.json",
                    fields: [
                      { label: "Title", name: "title", widget: "string" },
                      { label: "Subtitle", name: "subtitle", widget: "text" },
                      { label: "About Title", name: "aboutTitle", widget: "string" },
                      { label: "About Text", name: "aboutText", widget: "text" },
                      {
                        label: "Services", name: "services", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" }
                        ]
                      },
                      {
                        label: "Referral How", name: "referralHow", widget: "list",
                        field: { label: "Method", name: "method", widget: "string" }
                      },
                      {
                        label: "Referral Needed", name: "referralNeeded", widget: "list",
                        field: { label: "Item", name: "item", widget: "string" }
                      },
                      { label: "Office Address", name: "officeAddress", widget: "string" },
                      { label: "Office City", name: "officeCity", widget: "string" },
                      { label: "Phone", name: "phone", widget: "string" },
                      { label: "Fax", name: "fax", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      {
                        label: "Excellence Items", name: "excellenceItems", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" }
                        ]
                      },
                      { label: "CTA Title", name: "ctaTitle", widget: "string" },
                      { label: "CTA Text", name: "ctaText", widget: "text" }
                    ]
                  },
                  {
                    label: "New Patients",
                    name: "new-patients",
                    file: "content/pages/new-patients.json",
                    fields: [
                      { label: "Title", name: "title", widget: "string" },
                      { label: "Subtitle", name: "subtitle", widget: "text" },
                      { label: "Welcome Title", name: "welcomeTitle", widget: "string" },
                      { label: "Welcome Text", name: "welcomeText", widget: "text" },
                      {
                        label: "Visit Stages", name: "visitStages", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          {
                            label: "Steps", name: "steps", widget: "list",
                            field: { label: "Step", name: "step", widget: "string" }
                          }
                        ]
                      },
                      {
                        label: "Checklist", name: "checklist", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" }
                        ]
                      },
                      {
                        label: "Referral Steps", name: "referralSteps", widget: "list",
                        field: { label: "Step", name: "step", widget: "string" }
                      },
                      { label: "Phone", name: "phone", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      { label: "Schedule URL", name: "scheduleUrl", widget: "string" },
                      { label: "CTA Title", name: "ctaTitle", widget: "string" },
                      { label: "CTA Text", name: "ctaText", widget: "text" }
                    ]
                  },
                  {
                    label: "Patient Forms",
                    name: "patient-forms",
                    file: "content/pages/patient-forms.json",
                    fields: [
                      { label: "Title", name: "title", widget: "string" },
                      { label: "Subtitle", name: "subtitle", widget: "text" },
                      { label: "Before Appointment Text", name: "beforeAppointmentText", widget: "text" },
                      {
                        label: "New Patient Forms", name: "newPatientForms", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" },
                          { label: "URL", name: "url", widget: "string" }
                        ]
                      },
                      {
                        label: "Established Patient Forms", name: "establishedPatientForms", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" },
                          { label: "URL", name: "url", widget: "string" }
                        ]
                      },
                      {
                        label: "Downloadable Forms", name: "downloadableForms", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" },
                          { label: "File Name", name: "fileName", widget: "string" }
                        ]
                      },
                      {
                        label: "Online Services", name: "onlineServices", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" },
                          { label: "Link", name: "link", widget: "string" },
                          { label: "Icon", name: "icon", widget: "string" },
                          { label: "Icon Label", name: "iconLabel", widget: "string" }
                        ]
                      },
                      { label: "Phone", name: "phone", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      { label: "Address", name: "address", widget: "text" },
                      { label: "Schedule URL", name: "scheduleUrl", widget: "string" },
                      { label: "CTA Title", name: "ctaTitle", widget: "string" },
                      { label: "CTA Text", name: "ctaText", widget: "text" }
                    ]
                  },
                  {
                    label: "Our Team",
                    name: "our-team",
                    file: "content/pages/our-team.json",
                    description: "The /our-team page. Providers themselves are edited in the Providers collection.",
                    fields: [
                      { label: "Hero Title", name: "title", widget: "string", hint: "Large heading at the top of the page" },
                      { label: "Hero Subtitle", name: "subtitle", widget: "text" },
                      { label: "Filter Section Heading", name: "filterHeading", widget: "string", hint: "Heading above the category filter buttons (e.g. 'Find Your Provider')" },
                      { label: "CTA Title", name: "ctaTitle", widget: "string", hint: "Amber call-to-action section at the bottom" },
                      { label: "CTA Text", name: "ctaText", widget: "text" },
                      { label: "CTA Phone", name: "phone", widget: "string" },
                      { label: "Online Scheduling URL", name: "scheduleUrl", widget: "string" },
                      { label: "Scheduling Button Text", name: "scheduleButtonText", widget: "string", hint: "Label on the scheduling button (e.g. 'Schedule Online')" }
                    ]
                  },
                  {
                    label: "Join Our Team",
                    name: "join-our-team",
                    file: "content/pages/join-our-team.json",
                    description: "The /join-our-team careers page. Individual job listings are edited in the Job Listings collection.",
                    fields: [
                      { label: "Hero Title", name: "title", widget: "string" },
                      { label: "Hero Subtitle", name: "subtitle", widget: "text" },
                      { label: "About Section Title", name: "aboutTitle", widget: "string" },
                      {
                        label: "About Section Paragraphs", name: "aboutParagraphs", widget: "list",
                        hint: "Each item becomes its own paragraph under the About heading.",
                        field: { label: "Paragraph", name: "paragraph", widget: "text" }
                      },
                      { label: "Why Join Us Title", name: "whyJoinTitle", widget: "string" },
                      {
                        label: "Why Join Us Cards", name: "benefits", widget: "list",
                        hint: "Benefit cards shown in the Why Join Us grid. Editable, reorderable.",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" }
                        ]
                      },
                      { label: "Open Positions Heading", name: "openPositionsTitle", widget: "string" },
                      { label: "Apply Section Title", name: "applyTitle", widget: "string" },
                      { label: "Apply Intro Text", name: "applyIntro", widget: "string", hint: "Text shown before the email link." },
                      { label: "Apply Intro Suffix", name: "applyIntroEmailSuffix", widget: "string", hint: "Text shown after the email link (e.g. 'directly.')" },
                      { label: "Careers Email", name: "careersEmail", widget: "string", hint: "Receives application form submissions AND is the displayed email link. Changing this changes where applications go — coordinate with whoever manages careers email." }
                    ]
                  },
                  {
                    label: "Critical Care",
                    name: "critical-care",
                    file: "content/pages/critical-care.json",
                    fields: [
                      { label: "Title", name: "title", widget: "string" },
                      { label: "Subtitle", name: "subtitle", widget: "text" },
                      { label: "Approach Text", name: "approachText", widget: "text" },
                      {
                        label: "Services", name: "services", widget: "list",
                        fields: [
                          { label: "Title", name: "title", widget: "string" },
                          { label: "Description", name: "description", widget: "text" }
                        ]
                      },
                      {
                        label: "Locations", name: "locations", widget: "list",
                        fields: [
                          { label: "Name", name: "name", widget: "string" },
                          { label: "City", name: "city", widget: "string" }
