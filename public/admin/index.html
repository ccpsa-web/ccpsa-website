<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CCPSA Admin</title>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    function doInit() {
      var CMS = window.CMS || window.SveltiaCMS;
      if (CMS && CMS.init) {
        CMS.init({
          config: {
            load_config_file: false,
            backend: {
              name: "github",
              repo: "ccpsa-web/ccpsa-website",
              branch: "main",
              base_url: window.location.origin,
              auth_endpoint: "/api/auth"
            },
            media_folder: "public/images",
            public_folder: "/images",
            collections: [
              {
                name: "providers",
                label: "Providers",
                label_singular: "Provider",
                folder: "content/providers",
                create: true,
                delete: true,
                extension: "json",
                format: "json",
                slug: "{{slug}}",
                summary: "{{fields.name}} - {{fields.credentials}} ({{fields.category}})",
                sortable_fields: ["order", "name", "category"],
                fields: [
                  { label: "Name", name: "name", widget: "string", hint: "Full name (e.g. Darren Boe)" },
                  { label: "Credentials", name: "credentials", widget: "string", hint: "e.g. MD, PhD", required: false },
                  { label: "Title", name: "title", widget: "string", hint: "e.g. Attending Physician, Managing Partner" },
                  {
                    label: "Category", name: "category", widget: "select",
                    options: [
                      { label: "Critical Care", value: "critical-care" },
                      { label: "Interventional Pulmonology", value: "interventional-pulmonology" },
                      { label: "Outpatient Pulmonary & Sleep", value: "outpatient-pulmonary-sleep" },
                      { label: "Advanced Practice Provider", value: "app" },
                      { label: "Allied Health", value: "allied-health" },
                      { label: "Executive", value: "executive" }
                    ]
                  },
                  {
                    label: "Locations", name: "locations", widget: "list",
                    hint: "Service locations (e.g. West, South, North, Central, Multiple)",
                    field: { label: "Location", name: "location", widget: "string" }
                  },
                  { label: "Photo", name: "image", widget: "image", hint: "Upload provider headshot" },
                  { label: "Biography", name: "bio", widget: "text", hint: "Provider biography" },
                  { label: "Display Order", name: "order", widget: "number", value_type: "int", hint: "Lower numbers appear first" }
                ]
              },
              {
                name: "jobs",
                label: "Job Listings",
                label_singular: "Job Listing",
                folder: "content/jobs",
                create: true,
                delete: true,
                extension: "json",
                format: "json",
                slug: "{{slug}}",
                summary: "{{fields.title}} - {{fields.location}} ({{fields.status}})",
                fields: [
                  { label: "Job Title", name: "title", widget: "string" },
                  { label: "Location", name: "location", widget: "string", hint: "e.g. Parker, CO" },
                  {
                    label: "Employment Type", name: "type", widget: "select",
                    options: ["Full-time", "Part-time", "Contract", "PRN"]
                  },
                  {
                    label: "Status", name: "status", widget: "select",
                    options: [
                      { label: "Open", value: "open" },
                      { label: "Closed", value: "closed" }
                    ]
                  },
                  { label: "Summary", name: "summary", widget: "text", hint: "Brief job description shown on the card" },
                  {
                    label: "Essential Responsibilities", name: "responsibilities", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  {
                    label: "Skills & Education Requirements", name: "requirements", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  {
                    label: "Physical Requirements", name: "physicalRequirements", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  {
                    label: "Compensation & Benefits", name: "compensation", widget: "text",
                    hint: "Paste full text or a bulleted list. Lines starting with - or • will display as bullets on the site.",
                    required: false
                  },
                  { label: "Display Order", name: "order", widget: "number", value_type: "int", hint: "Lower numbers appear first" }
                ]
              },
              {
                name: "pages",
                label: "Page Content",
                files: [
                  {
                    label: "Homepage",
                    name: "homepage",
                    file: "content/pages/homepage.json",
                    fields: [
                      { label: "Hero Tagline", name: "heroTagline", widget: "string" },
                      { label: "Hero Title", name: "heroTitle", widget: "string" },
                      { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" },
                      { label: "Phone Number", name: "phone", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      { label: "Address", name: "address", widget: "string" },
                      { label: "Fax", name: "fax", widget: "string" }
                    ]
                  },
                  {
                    label: "Contact Page",
                    name: "contact",
                    file: "content/pages/contact.json",
                    fields: [
                      { label: "Page Title", name: "title", widget: "string" },
                      { label: "Phone", name: "phone", widget: "string" },
                      { label: "Fax", name: "fax", widget: "string" },
                      { label: "Email", name: "email", widget: "string" },
                      {
                        label: "Locations", name: "locations", widget: "list",
                        fields: [
                          { label: "Name", name: "name", widget: "string" },
                          { label: "Address", name: "address", widget: "string" },
                          { label: "Phone", name: "phone", widget: "string" }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
        });
      }
    }

    if (document.readyState === 'complete') {
      doInit();
    } else {
      window.addEventListener('load', doInit);
    }
  </script>
</body>
</html>
